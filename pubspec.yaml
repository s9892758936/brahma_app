name: brahma_app
description: BRAHMA - Brahman Abhyudaya Hitarth Mahasangh Arohan
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 FIREBASE
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  firebase_storage: ^11.5.0
  cloud_firestore: ^4.13.0
  firebase_messaging: ^14.6.0
  
  # 🧭 ROUTING
  go_router: ^14.0.0
  
  # 📊 STATE MANAGEMENT
  provider: ^6.1.2
  
  # 💾 STORAGE
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  
  # 📸 IMAGE PICKER
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  
  # 🌐 CONNECTIVITY
  connectivity_plus: ^6.0.0
  
  # 🎨 UI
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  shimmer: ^3.0.0
  photo_view: ^0.14.0
  flutter_svg: ^2.0.10
  
  # 🔔 NOTIFICATIONS
  flutter_local_notifications: ^17.0.0
  
  # 🛠️ UTILITIES
  intl: ^0.19.0
  uuid: ^4.4.0
  rxdart: ^0.28.0
  nm: ^0.5.0
  
  # 🌐 WEB
  flutter_web_plugins:
    sdk: flutter

  # 🎯 ICONS
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # 🎨 APP ICON
  flutter_launcher_icons: ^0.13.1
  
  # 🎨 SPLASH SCREEN
  flutter_native_splash: ^2.3.8

# ============================================================
# 📱 APP ICON CONFIG
# ============================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FF6F00"
  adaptive_icon_foreground: "assets/images/app_icon.png"

# ============================================================
# 🎨 SPLASH SCREEN - ONLY LOGO (NO TEXT)
# ============================================================
flutter_native_splash:
  color: "#FF6F00"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

# ============================================================
# 📁 FLUTTER CONFIG
# ============================================================
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/